services:
  transcriber:
    build: ./transcriber
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    environment:
      HF_HOME: /models
      WHISPER_MODELS: ${WHISPER_MODELS:-small,large-v3}
      HF_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    environment:
      TRANSCRIBER_URL: http://transcriber:8000
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SUMMARIZER_PROVIDER: ${SUMMARIZER_PROVIDER:-gemini}
    depends_on:
      - transcriber
    restart: unless-stopped

  tg-bot:
    build:
      context: ./tg-bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      GATEWAY_URL: http://gateway:8080
      TELEGRAM_API_URL: http://telegram-bot-api:8081
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    depends_on:
      - gateway
      - telegram-bot-api
    restart: unless-stopped

  app-material:
    build:
      context: ./app
      args:
        FLUTTER_TARGET: lib/material/main_material.dart
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  app-fluent:
    build:
      context: ./app
      args:
        FLUTTER_TARGET: lib/fluent/main_fluent.dart
    ports:
      - "3001:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  model-cache:
  bot-api-data:
