services:
  transcriber:
    build: ./transcriber
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    environment:
      HF_HOME: /models
      WHISPER_MODELS: ${WHISPER_MODELS:-small,large-v3}
      HF_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TRANSCRIBER_URL: http://transcriber:8000
      TELEGRAM_API_URL: http://telegram-bot-api:8081
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    depends_on:
      - transcriber
      - telegram-bot-api
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "3000:80"
    depends_on:
      - transcriber
    restart: unless-stopped

volumes:
  model-cache:
  bot-api-data:
