services:
  transcriber:
    build: ./transcriber
    ports:
      - "8000:8000"
    volumes:
      - model-cache:/models
    environment:
      HF_HOME: /models
      WHISPER_MODELS: ${WHISPER_MODELS:-small,large-v3}
      HF_TOKEN: ${HF_TOKEN:-}
    restart: unless-stopped

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: "true"
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    restart: unless-stopped

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: dictara
      POSTGRES_USER: dictara
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dictara"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ./gateway
    ports:
      - "8080:8080"
    environment:
      TRANSCRIBER_URL: http://transcriber:8000
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/dictara
      SPRING_DATASOURCE_USERNAME: dictara
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      SUMMARIZER_PROVIDER: ${SUMMARIZER_PROVIDER:-gemini}
    depends_on:
      postgres:
        condition: service_healthy
      transcriber:
        condition: service_started
    restart: unless-stopped

  tg-bot:
    build:
      context: ./tg-bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      GATEWAY_URL: http://gateway:8080
      TELEGRAM_API_URL: http://telegram-bot-api:8081
    volumes:
      - bot-api-data:/var/lib/telegram-bot-api
    depends_on:
      - gateway
      - telegram-bot-api
    restart: unless-stopped

  app-material:
    build:
      context: ./app
      args:
        FLUTTER_TARGET: lib/material/main_material.dart
    ports:
      - "3000:80"
    depends_on:
      - gateway
    restart: unless-stopped

  app-fluent:
    build:
      context: ./app
      args:
        FLUTTER_TARGET: lib/fluent/main_fluent.dart
    ports:
      - "3001:80"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  model-cache:
  bot-api-data:
  postgres-data:
