name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
      - name: Run gateway tests
        working-directory: gateway
        run: gradle test
      - name: Run tg-bot tests
        working-directory: tg-bot
        run: gradle test
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run transcriber smoke tests
        working-directory: transcriber
        run: |
          pip install fastapi httpx pytest python-multipart prometheus-fastapi-instrumentator prometheus_client
          pytest test_smoke.py -v

  deploy:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            gateway:
              - 'gateway/**'
            tg_bot:
              - 'tg-bot/**'
            app:
              - 'app/**'
            transcriber:
              - 'transcriber/**'
            monitoring:
              - 'monitoring/**'
              - 'docker-compose.yml'

      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          envs: GATEWAY_CHANGED,BOT_CHANGED,APP_CHANGED,TRANSCRIBER_CHANGED,MONITORING_CHANGED
          script: |
            cd ~/dictara
            git pull
            export GIT_COMMIT=$(git rev-parse --short HEAD)
            export BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            bash scripts/set-limits.sh
            set -a; source .env.limits; set +a
            if [ "$GATEWAY_CHANGED" = "true" ]; then
              docker compose build gateway && docker compose up -d --remove-orphans --force-recreate gateway
            fi
            if [ "$BOT_CHANGED" = "true" ]; then
              docker compose build tg-bot && docker compose up -d --remove-orphans --force-recreate tg-bot
            fi
            if [ "$APP_CHANGED" = "true" ]; then
              docker compose build app-material && docker compose up -d --remove-orphans --force-recreate app-material
            fi
            if [ "$TRANSCRIBER_CHANGED" = "true" ]; then
              docker compose build transcriber && docker compose up -d --remove-orphans --force-recreate transcriber
            fi
            if [ "$MONITORING_CHANGED" = "true" ]; then
              docker compose up -d --force-recreate prometheus loki promtail
            fi
        env:
          GATEWAY_CHANGED: ${{ steps.changes.outputs.gateway }}
          BOT_CHANGED: ${{ steps.changes.outputs.tg_bot }}
          APP_CHANGED: ${{ steps.changes.outputs.app }}
          TRANSCRIBER_CHANGED: ${{ steps.changes.outputs.transcriber }}
          MONITORING_CHANGED: ${{ steps.changes.outputs.monitoring }}
