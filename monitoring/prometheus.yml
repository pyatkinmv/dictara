global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8080']
    metrics_path: /actuator/prometheus

  - job_name: transcriber
    static_configs:
      - targets: ['transcriber:8000']
    metrics_path: /metrics

  - job_name: tg-bot
    static_configs:
      - targets: ['tg-bot:9090']
    metrics_path: /metrics
    fallback_scrape_protocol: PrometheusText0.0.4
