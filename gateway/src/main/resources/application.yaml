server:
  port: 8080

spring:
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 2GB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dictara}
    username: ${SPRING_DATASOURCE_USERNAME:dictara}
    password: ${SPRING_DATASOURCE_PASSWORD:dictara_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-produces-media-type: application/json

dictara:
  transcriber:
    url: ${TRANSCRIBER_URL:http://localhost:8000}
    poll-interval-ms: 5000
    timeout-hours: 4
  summarizer:
    provider: ${SUMMARIZER_PROVIDER:gemini}
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: ${GEMINI_MODEL:gemini-2.5-flash}
