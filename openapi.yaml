openapi: 3.0.1
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /transcribe:
    post:
      tags:
      - transcribe-controller
      operationId: transcribe
      parameters:
      - name: model
        in: query
        required: false
        schema:
          type: string
          default: fast
      - name: language
        in: query
        required: false
        schema:
          type: string
          default: auto
      - name: diarize
        in: query
        required: false
        schema:
          type: boolean
          default: false
      - name: num_speakers
        in: query
        required: false
        schema:
          type: integer
          format: int32
      - name: summary_mode
        in: query
        required: false
        schema:
          type: string
          default: auto
      requestBody:
        content:
          application/json:
            schema:
              required:
              - file
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitResponse"
  /jobs/{jobId}:
    get:
      tags:
      - transcribe-controller
      operationId: getJob
      parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
  /health:
    get:
      tags:
      - transcribe-controller
      operationId: health
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string
components:
  schemas:
    SubmitResponse:
      required:
      - job_id
      type: object
      properties:
        job_id:
          type: string
    JobResponse:
      required:
      - job_id
      - status
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
        progress:
          $ref: "#/components/schemas/ProgressResponse"
        result:
          $ref: "#/components/schemas/ResultResponse"
        duration_s:
          type: number
          format: double
        elapsed_s:
          type: number
          format: double
        error:
          type: string
    ProgressResponse:
      required:
      - phase
      type: object
      properties:
        phase:
          type: string
        processed_s:
          type: number
          format: double
        total_s:
          type: number
          format: double
        diarize_progress:
          type: number
          format: double
    ResultResponse:
      required:
      - formatted_text
      - segments
      type: object
      properties:
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentResponse"
        formatted_text:
          type: string
        summary:
          type: string
        audio_duration_s:
          type: number
          format: double
    SegmentResponse:
      required:
      - end
      - start
      - text
      type: object
      properties:
        start:
          type: number
          format: double
        end:
          type: number
          format: double
        text:
          type: string
        speaker:
          type: string
